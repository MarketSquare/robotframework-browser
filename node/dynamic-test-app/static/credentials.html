<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WebAuthn Credentials Test</title>
        <style>
            body {
                font-family: sans-serif;
            }
            .container {
                max-width: 600px;
                margin: 2em auto;
            }
            button {
                padding: 0.5em 1em;
                margin: 0.5em 0;
            }
            #status {
                margin-top: 1em;
                padding: 1em;
                border: 1px solid #ccc;
                background-color: #f8f8f8;
                white-space: pre-wrap;
                word-wrap: break-word;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>WebAuthn Credentials Test</h1>
            <p>
                Test page for navigator.credentials.get() with a preinstalled credential. Uses hard coded username: testuser. Also rpId is hard coded to localhost.
            </p>

            <button id="login">Login with Credential</button>
            <button id="navigatorCredentialsCreate">Navigator Credentials Create</button>


            <h2>Status</h2>
            <div id="status">Waiting for action...</div>

            <h2>Credential Debug</h2>
            <div id="credentialDebug">
                <div>rpId: <span id="debug-rpId"></span></div>
                <div>id: <span id="debug-id"></span></div>
                <div>privateKey: <span id="debug-privateKey"></span></div>
                <div>publicKey: <span id="debug-publicKey"></span></div>
                <div>userHandle: <span id="debug-userHandle"></span></div>
            </div>

        </div>

        <script>
            const loginButton = document.getElementById('login');
            const statusDiv = document.getElementById('status');
            const debugRpId = document.getElementById('debug-rpId');
            const debugId = document.getElementById('debug-id');
            const debugPrivateKey = document.getElementById('debug-privateKey');
            const debugPublicKey = document.getElementById('debug-publicKey');
            const debugUserHandle = document.getElementById('debug-userHandle');
            const navigatorCredentialsCreateButton = document.getElementById('navigatorCredentialsCreate');
            var xhr = new XMLHttpRequest();


            const setStatus = (text) => {
                statusDiv.textContent = text;
            };

            const setCredentialDebug = (credential) => {
                debugRpId.textContent = credential.rpId || '';
                debugId.textContent = credential.id || '';
                debugPrivateKey.textContent = credential.privateKey || '';
                debugPublicKey.textContent = credential.publicKey || '';
                debugUserHandle.textContent = credential.userHandle || '';
            };

            const clearCredentialDebug = () => {
                setCredentialDebug({ rpId: '', id: '', privateKey: '', publicKey: '', userHandle: '' });
            };


            clearCredentialDebug();

            function base64URLToBuffer(base64url) {
                base64url = base64url.replace(/-/g, '+').replace(/_/g, '/');
                const pad = (4 - (base64url.length % 4)) % 4;
                const base64 = (base64url + '===='.slice(0, pad)).replace(/-/g, '+').replace(/_/g, '/');
                const raw = atob(base64);
                const buffer = new ArrayBuffer(raw.length);
                const bytes = new Uint8Array(buffer);
                for (let i = 0; i < raw.length; i++) {
                    bytes[i] = raw.charCodeAt(i);
                }
                return buffer;
            }

            navigatorCredentialsCreateButton.addEventListener('click', async () => {
                try {
                    const publicKey = {
                    challenge: "challengeFromServer",
                    rp: { id: "localhost", name: "Robot Framework" },
                    user: {
                        id: new Uint8Array([79, 252, 83, 72, 214, 7, 89, 26]),
                        name: "joulupukki",
                        displayName: "Santa Claus",
                    },
                    pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                    };
                    const credential = await navigator.credentials.create({ publicKey });
                    xhr.open('POST', '/api/log/event', true);
                    xhr.setRequestHeader('Content-Type', 'application/json');
                    xhr.send(JSON.stringify({ event: 'CreateCredentials', credential: credential }));
                    setCredentialDebug(credential);
                    setStatus(`Navigator Credentials Create Success with ${JSON.stringify(credential)}`);
                } catch (err) {
                    setStatus(`Error during navigator.credentials.create: ${err.message}`);
                }
            });
            loginButton.addEventListener('click', async () => {
                try {

                    const challengeRes = await fetch('/login-challenge', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: 'testuser' }),
                    });
                    if (!challengeRes.ok) {
                        throw new Error(`Login challenge failed: ${await challengeRes.text()}`);
                    }
                    const options = await challengeRes.json();
                    options.challenge = base64URLToBuffer(options.challenge);
                    if (options.allowCredentials) {
                        options.allowCredentials = options.allowCredentials.map((cred) => ({
                            ...cred,
                            id: base64URLToBuffer(cred.id),
                        }));
                    }

                    xhr.open('POST', '/api/log/event', true);
                    xhr.setRequestHeader('Content-Type', 'application/json');
                    xhr.send(JSON.stringify({ event: 'getCredentials', publicKey: options }));
                    await navigator.credentials.get({ publicKey: options });
                    setStatus('Success');
                } catch (err) {
                    setStatus(`Error during login: ${err.message}`);
                }
                const validOptions = { "rpId": "localhost" }
                const validCredential = await navigator.credentials.get({ publicKey: validOptions });
                setCredentialDebug(validCredential);
            });
        </script>
        <script src="/test-app-logger.js"></script>
    </body>
</html>
