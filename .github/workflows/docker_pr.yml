name: Docker CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - main

jobs:
  build_browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: 'npm'
      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip install wheel --python 3.13  --system --verbose
          uv pip install -r Browser/dev-requirements.txt  --python 3.13 --system
          uv pip install -r pyproject.toml  --python 3.13  --system
          inv deps
      - name: Build proto
        run: |
          inv protobuf
      - name: Build
        run: |
          inv build
      - name: Build the wheel
        run: |
          inv create-package
      - name: Upload Browser wheel
        uses: actions/upload-artifact@v4
        with:
          name: browser-wheel
          path: dist/*.whl
      - name: Create demo app
        run: |
          inv demo-app
      - name: Pack demo app
        uses: actions/upload-artifact@v4
        with:
          name: demoapp
          path: zip_results/demoapp

  docker-image:
    runs-on: ubuntu-latest
    needs: build_browser
    permissions: write-all
    steps:
      - uses: actions/checkout@v5
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/marketsquare/robotframework-browser/rfbrowser-dev
      - name: Download browser wheel
        uses: actions/download-artifact@v5
        with:
          name: browser-wheel
          path: docker/dist
      - name: Debug ls
        run: |
          ls -l docker/dist
          echo ===========================
          ls -l docker
          echo ===========================
          pwd
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GitHub Packages
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dev_pr
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
